<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Section 114: Book Cooking Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="crt_effect.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="game.js"></script>
</head>

<body x-data="councilGame" @mousemove="updateCamera" >
    <div id="background"></div>

    <div id="glass-container"></div>
    <div id="monitor-vignette">
        <div id="monitor-screen" :style="`transform: rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1);` + bloomColor">
            <div id="crt-container" class="crt-filter"></div>
            <div id="desktop" @click.self="clearSelection()">

                <!-- RENDER ICONS -->
                <template x-for="icon in desktopIcons" :key="icon.id">
        
                    <div class="desktop-icon" 
                        @click="selectedIcon = icon.id"
                        @dblclick=" openProgram(icon.id)"
                        @click.outside="selectedIcon === icon.id ? selectedIcon = null : null">
                        
                        <img :src="icon.img" alt="Icon">
                        
                        <span :class="selectedIcon === icon.id ? 'selected' : ''" 
                            x-text="icon.name"></span>
                    </div>
                    
                </template>
                <!-- RENDER WINDOWS -->
                <template x-for="win in openWindows" :key="win.id">
                    
                    <div class="window" 
                        x-data="draggableWindow(win.startX, win.startY)" 
                        :style="{ position: 'absolute', left: x + 'px', top: y + 'px', width: win.width + 'px' }">
                        
                        <div class="title-bar" 
                            @mousedown.prevent="dragStart" 
                            @mousemove.window="drag" 
                            @mouseup.window="dragEnd"
                            style="cursor: grab;"
                            :style="isDragging && { cursor: 'grabbing' }">
                            
                            <div class="title-bar-text" x-text="win.title"></div>
                            
                            <div class="title-bar-controls">
                                <button aria-label="Close" @click="closeProgram(win.id)"></button>
                            </div>
                        </div>
                        
                        <div class="window-body">
                            <p x-text="win.content"></p>
                        </div>
                        
                    </div>
                </template>

                    <button @click="processFraud(1000000)" @click="suspicionLevel = 80">Raise Suspicion</button>
                    <p>Value: <span x-text="budget"></span></p>
                    <button @click="suspicionLevel = 0">Reset Suspicion</button>

                <div class="taskbar" x-data="councilGame">

                    <div style="position: relative;">
                        
                        <button x-on:click="isStartOpen = !isStartOpen" 
                                style="font-weight: bold; padding: 2px 5px;">
                            <img src="ico/windows.ico" alt="Start" style="width: 16px; vertical-align: middle;"> Start
                        </button>

                        <div class="window start-menu" 
                            x-show="isStartOpen" 
                            x-cloak 
                            x-on:click.outside="isStartOpen = false">
                            
                            <div class="title-bar" style="background: linear-gradient(90deg, navy, #1084d0);">
                                <div class="title-bar-text">Council OS</div>
                            </div>
                            <div class="window-body" style="margin: 0; padding: 5px;">
                                <button style="width: 100%; text-align: left; margin-bottom: 3px;">Outlook Express</button>
                                <button style="width: 100%; text-align: left; margin-bottom: 3px;">Microsoft Excel</button>
                                <hr style="margin: 5px 0;">
                                <button style="width: 100%; text-align: left;">Log Off...</button>
                            </div>
                        </div>

                    </div>

                    <div class="status-bar" style="margin: 0;">
                        <p class="status-bar-field" style="padding: 2px 10px;" x-text="currentTime"></p>
                    </div>

                </div>
            </div>
    </div>
</div>
</body>
</html>
